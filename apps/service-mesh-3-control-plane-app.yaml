apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-mesh-control-plane
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: git@github.com:madun0/cisco_ocp.git
    targetRevision: main
    path: charts/service-mesh-3-control-plane
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
  ignoreDifferences:
    - group: sailoperator.io
      kind: Istio
      jsonPointers:
        - /spec
        - /status
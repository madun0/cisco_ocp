apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth0-idp
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: git@github.com:madun0/cisco_ocp.git
    targetRevision: main
    path: charts/okta-idp
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-config
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-monitoring-config
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: default
  source:
    repoURL: git@github.com:madun0/cisco_ocp.git
    targetRevision: main
    path: charts/openshift-monitoring-config
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- range .Values.clusterRoleBindings }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .name }}
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ .group }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .clusterRole }}
---
{{- end }}
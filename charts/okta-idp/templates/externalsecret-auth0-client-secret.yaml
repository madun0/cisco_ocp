apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.auth0.externalSecretName }}
  namespace: {{ .Values.openshiftConfigNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.auth0.externalSecretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        clientSecret: "{{ `{{ .clientSecret }}` }}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: {{ .Values.auth0.remoteSecretKey }}
        property: {{ .Values.auth0.remoteProperty }}
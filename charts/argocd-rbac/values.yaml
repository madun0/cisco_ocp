argocd:
  name: openshift-gitops
  namespace: openshift-gitops

rbac:
  defaultPolicy: role:readonly
  scopes: "[groups]"
  policy: |
    p, role:argocd-admin, applications, *, */*, allow
    p, role:argocd-admin, projects, *, *, allow
    p, role:argocd-admin, repositories, *, *, allow
    p, role:argocd-admin, logs, get, */*, allow
    p, role:argocd-admin, exec, create, */*, allow

    p, role:argocd-readonly, applications, get, */*, allow
    p, role:argocd-readonly, projects, get, *, allow
    p, role:argocd-readonly, logs, get, */*, allow

    p, role:argocd-syncer, applications, get, */*, allow
    p, role:argocd-syncer, applications, sync, */*, allow
    p, role:argocd-syncer, applications, action/*, */*, allow
    p, role:argocd-syncer, logs, get, */*, allow

    g, ocp-argocd-admins, role:argocd-admin
    g, ocp-argocd-readonly, role:argocd-readonly
    g, ocp-argocd-syncers, role:argocd-syncer
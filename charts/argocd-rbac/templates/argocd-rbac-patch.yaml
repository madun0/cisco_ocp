apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: {{ .Values.argocd.name }}
  namespace: {{ .Values.argocd.namespace }}
spec:
  server:
    route:
      enabled: true
  sso:
    provider: dex
    dex:
      openShiftOAuth: true
  rbac:
    defaultPolicy: {{ .Values.rbac.defaultPolicy | quote }}
    policy: |
{{ .Values.rbac.policy | indent 6 }}
    scopes: {{ .Values.rbac.scopes | quote }}
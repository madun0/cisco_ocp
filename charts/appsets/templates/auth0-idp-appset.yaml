apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.apps.auth0Idp.name }}
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: {{ .Values.environment | quote }}
  template:
    metadata:
      name: {{ .Values.apps.auth0Idp.name }}
      annotations:
        argocd.argoproj.io/sync-wave: {{ .Values.apps.auth0Idp.wave | quote }}
    spec:
      project: default
      source:
        repoURL: {{ .Values.repo.url | quote }}
        targetRevision: {{ .Values.repo.revision | quote }}
        path: {{ .Values.apps.auth0Idp.chartPath | quote }}
        helm:
          valueFiles:
            - values.yaml
            - values-{{ .Values.environment }}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: {{ .Values.apps.auth0Idp.destinationNamespace | quote }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true